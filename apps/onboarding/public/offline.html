<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0A0A0A" />
    <title>Autolokate · Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0a0a;
        --text: #f5f5f5;
        --muted: #a3a3a3;
        --accent: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: calc(24px + env(safe-area-inset-top, 0px)) 24px
          calc(24px + env(safe-area-inset-bottom, 0px));
      }

      main {
        width: min(100%, 22rem);
        text-align: center;
      }

      img {
        width: 72px;
        height: 72px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
        font-weight: 600;
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
        line-height: 1.5;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        min-height: 58px;
        width: 100%;
        padding: 0 20px;
        font-size: 1rem;
        font-weight: 600;
        background: var(--accent);
        color: var(--bg);
        cursor: pointer;
      }

      button:active {
        opacity: 0.92;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" width="72" height="72" alt="" />
      <h1>You're offline</h1>
      <p>Autolokate needs a connection to load. Check your network, then try again.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
